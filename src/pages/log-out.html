<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Out</title>
    <link href="../../dist/output.css" rel="stylesheet">
</head>

<body class="bg-white">

  <div class="flex flex-col items-start justify-start max-w-[500px] mx-auto min-h-screen px-6 pt-16 gap-8">

    <header>
      <h1 class="text-3xl font-medium mb-1">
        Log out from your account.
      </h1>

      <span class="text-gray-500 text-sm font-medium">youremail@example.com</span>
    </header>

    <div class="w-full">

      <form action="../../index.html" class="flex flex-col gap-7">
        <div class="flex justify-center">
          <button type="submit" class="w-full bg-black text-white px-6 py-4 rounded-full font-medium hover:bg-zinc-800 transition-colors duration-200">
            Log Out
          </button>
        </div>
      </form>

    </div>

  </div>

</body>
</html>
