<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Profile</title>
    <link href="../../dist/output.css" rel="stylesheet">
</head>

<body class="bg-white min-h-screen">

    <header class="w-full">
        <div class="~h-4/8 bg-gray-100 flex items-center justify-end ~p-4/6 text-xs">
            <div class="flex ~gap-2/3 font-bold">
                <a href="help.html" class="hover:underline">Help</a>
                <span class="text-black">|</span>
                <a href="log-in.html" class="hover:underline">Join Us</a>
                <span class="text-black">|</span>
                <a href="sign-in.html" class="hover:underline">Sign In</a>
            </div>
        </div>

        <div class="relative w-full bg-white flex items-center justify-end ~p-3/6 ~h-10/20">
            <div class="hidden md:block flex-1"></div>

            <div class="flex left-1/2 ~gap-2/5 font-semibold ~text-sm/base">
                <a href="index.html" class="hover:underline">New</a>
                <a href="all-products.html" class="hover:underline">All</a>
                <a href="all-products.html" class="hover:underline">Men</a>
                <a href="all-products.html" class="hover:underline">Women</a>
                <a href="all-products.html" class="hover:underline">Sport</a>
            </div>

            <div class="flex-1 flex items-center justify-end ~gap-1/3">
                <div class="rounded-full bg-gray-100 ~h-5/10 flex items-center ~pl-2/3 ~gap-1/2">
                    <div class="flex items-center justify-center">
                        <img src="../../assets/lucide/search.svg" class="~w-4/5 ~h-4/5 block">
                    </div>
                    <input type="text" placeholder="Search" class="outline-none ~text-sm/base ~w-12/24 text-gray-500 font-semibold bg-transparent">
                </div>

                <a href="favourites.html" class="hover:bg-gray-300 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart">
                        <path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/>
                    </svg>
                </a>

                <a href="bag.html" class="hover:bg-gray-300 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-handbag-icon lucide-handbag">
                        <path d="M2.048 18.566A2 2 0 0 0 4 21h16a2 2 0 0 0 1.952-2.434l-2-9A2 2 0 0 0 18 8H6a2 2 0 0 0-1.952 1.566z"/>
                        <path d="M8 11V6a4 4 0 0 1 8 0v5"/>
                    </svg>
                </a>
            </div>

        </div>

        <div class="~h-12/20 ~p-3/6 bg-gray-100 flex items-center justify-center">
            <span class="~text-lg/2xl text-gray-500 font-semibold">Where comfort meets style</span>
        </div>

    </header>


    <main class="max-w-[1000px] mx-auto ~mt-4/8 ~p-4/6">

        <div class="flex flex-col lg:flex-col ~gap-8/16">
            <h1 class="~text-xl/3xl font-semibold">My profile</h1>
            <div class="flex items-center ~gap-3/5">
                <div class="~w-14/20 ~h-14/20 rounded-full bg-gray-200 flex-shrink-0"></div>

                <div class="relative">
                    <button class="absolute -top-1 -right-5 text-gray-400 hover:text-gray-700">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <p class="~text-lg/2xl font-bold text-gray-900">Vitalii Diurd</p>
                    <p class="~text-xs/sm text-gray-400">Administrator</p>
                </div>
            </div>

            <div class="border-b-2 border-gray-200 pb-5">
                <div class="flex items-center justify-between ">
                    <div class="flex items-center ~gap-2/3">
                        <img src="../../assets/lucide/letter.svg" class="~w-4/5 ~h-4/5 block">
                        <span class="~text-xs/sm text-gray-700">youremail@gmail.com</span>
                    </div>
                    <a href="#" class="~text-xs/sm text-gray-700 font-medium flex items-center gap-0.5 hover:text-gray-900">
                        Edit
                            <img src="../../assets/lucide/chevron-right.svg" class="~w-4/5 ~h-4/5 block">
                    </a>
                </div>
            </div>

            <div class="border-b-2 border-gray-200 pb-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center ~gap-2/3">
                        <img src="../../assets/lucide/lock.svg" class="~w-4/5 ~h-4/5 block">
                        <span class="~text-xs/sm text-gray-700 tracking-widest">••••••••</span>
                    </div>
                    <a href="#" class="~text-xs/sm text-gray-700 font-medium flex items-center gap-0.5 hover:text-gray-900">
                        Edit
                        <img src="../../assets/lucide/chevron-right.svg" class="~w-4/5 ~h-4/5 block">
                    </a>
                </div>
            </div>

            <div class="flex w-full ~gap-4/8">
                <a href="admin-add-product.html" class="w-1/2 border py-4 rounded-full font-semibold transition flex items-center justify-center gap-2 hover:border-black">
                    Add Product
                </a>

                <button type="submit" class="w-1/2 bg-black text-white px-6 ~py-4/3 rounded-full font-medium hover:bg-zinc-800 transition-colors duration-200">
                    Log Out
                </button>
            </div>
        </div>

    </main>

    <footer>
        <div class="~p-4/6 max-w-[1200px] mx-auto">
            <hr class="border-t-1 md:border-t-2 border-gray-300">
            <div class="flex items-center justify-start w-full">

                <div class="flex items-center justify-start w-1/2 ~mt-3/5">
                    <span class="text-black ~text-xs/sm">© 2026 Iken, Inc. All rights reserved</span>
                </div>

                <div class="flex items-center justify-end ~gap-2/3 w-1/2 ~mt-3/5">
                    <div class="flex items-center justify-center">
                        <img src="../../assets/lucide/planet.svg" class="~w-4/5 ~h-4/5 block">
                    </div>
                    <span class="text-gray-400 ~text-xs/sm">Slovakia (Slovak Republic)</span>
                </div>

            </div>
        </div>
    </footer>

</body>
</html>
