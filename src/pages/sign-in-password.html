<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Sign In</title>
    <link href="../../dist/output.css" rel="stylesheet">
</head>

<body class="bg-white">

  <div class="flex flex-col items-start justify-start max-w-[500px] mx-auto min-h-screen px-6 pt-16 gap-8">

    <header>
      <h1 class="text-3xl font-medium mb-1.5">
        Enter your password.
      </h1>

      <div class="flex flex-col">
        <span class="text-gray-500 text-base font-medium mb-4">youremail@example.com</span>
        <span class="text-gray-500 text-sm">Slovakia (Slovak Republic)</span>
      </div>
    </header>

    <div class="w-full">

      <form action="../../index.html" class="flex flex-col gap-5">
        <div class="relative">
          <input type="password" id="password" placeholder="Password*" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-lg focus:border-black focus:ring-1 focus:ring-black outline-none transition-all peer placeholder-transparent">
          <label for="password" class="absolute left-4 -top-2.5 bg-white px-1 text-xs text-gray-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-focus:-top-2.5 peer-focus:text-xs">
            Password*
          </label>
        </div>

        <div class="flex justify-center pt-6">
          <button type="submit" class="w-full bg-black text-white px-6 py-4 rounded-full font-medium hover:bg-zinc-800 transition-colors duration-200">
            Sign In
          </button>
        </div>
      </form>

    </div>

  </div>

</body>
</html>
